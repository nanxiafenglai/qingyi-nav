<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>清漪导航 · 前端预览</title><style>
:root{font-family:Inter,'Microsoft YaHei',system-ui,sans-serif;color:#162033;background:#eef4ff}*{box-sizing:border-box}body{margin:0}.page{min-height:100vh;padding:28px;background:radial-gradient(circle at 10% 8%,rgba(88,166,255,.3),transparent 28%),radial-gradient(circle at 88% 18%,rgba(168,85,247,.18),transparent 28%),linear-gradient(135deg,#f8fbff,#eef4ff 45%,#f9f6ff)}.hero,.cat,.main{border:1px solid rgba(255,255,255,.72);background:linear-gradient(135deg,rgba(255,255,255,.86),rgba(255,255,255,.58));box-shadow:0 28px 80px rgba(48,71,120,.14);backdrop-filter:blur(20px)}.hero{max-width:1180px;margin:auto;border-radius:34px;overflow:hidden}.top{display:flex;justify-content:space-between;align-items:center;padding:22px 26px}.brand{display:flex;gap:12px;align-items:center}.logo{width:44px;height:44px;display:grid;place-items:center;border-radius:15px;color:white;font-weight:900;background:linear-gradient(135deg,#4f8cff,#8b5cf6);box-shadow:0 12px 28px rgba(79,140,255,.36)}.brand span{display:block;color:#7a879c;font-size:12px}.admin{border:0;border-radius:999px;padding:11px 16px;background:rgba(255,255,255,.72);color:#344155}.center{text-align:center;padding:42px 26px 58px}.eyebrow{color:#5b6ee1;font-weight:800}.center h1{margin:14px 0;font-size:clamp(36px,7vw,72px);line-height:1.08;letter-spacing:-3px}.sub{max-width:720px;margin:0 auto 30px;color:#64748b;font-size:17px;line-height:1.8}.search{max-width:680px;margin:auto;display:flex;gap:12px;align-items:center;padding:17px 20px;border-radius:22px;background:rgba(255,255,255,.88);box-shadow:0 18px 45px rgba(40,66,112,.12),inset 0 0 0 1px rgba(108,124,147,.12)}.search input{width:100%;border:0;outline:0;background:transparent;font-size:16px}.grid{max-width:1180px;margin:24px auto 0;display:grid;grid-template-columns:260px 1fr;gap:22px}.cat,.main{border-radius:28px}.cat{padding:18px;height:max-content;position:sticky;top:24px}.cat h3{margin:6px 6px 14px}.cat button{width:100%;display:flex;justify-content:space-between;margin:8px 0;padding:13px 14px;border:0;border-radius:16px;background:transparent;color:#526174;cursor:pointer}.cat small{padding:2px 9px;border-radius:999px;background:#eef3fb}.cat button.active{color:white;background:linear-gradient(135deg,#4f8cff,#8b5cf6);box-shadow:0 14px 28px rgba(79,140,255,.25)}.cat button.active small{background:rgba(255,255,255,.22)}.main{padding:22px}.head{display:flex;justify-content:space-between;gap:18px;margin-bottom:18px}.head p{margin:0 0 5px;color:#7a879c}.head h2{margin:0;font-size:24px}.head span{height:max-content;color:#64748b;background:#f1f5fb;padding:8px 12px;border-radius:999px}.cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.card{display:flex;gap:15px;padding:18px;border-radius:22px;background:rgba(255,255,255,.76);border:1px solid rgba(148,163,184,.15);cursor:pointer;transition:.2s}.card:hover{transform:translateY(-4px);box-shadow:0 18px 38px rgba(51,65,85,.13);border-color:rgba(79,140,255,.35)}.ico{flex:0 0 auto;width:52px;height:52px;display:grid;place-items:center;border-radius:18px;font-size:25px;background:color-mix(in srgb,var(--c) 12%,white);color:var(--c)}.title{display:flex;justify-content:space-between;gap:8px}.title h3{margin:0;font-size:18px}.card p{margin:8px 0 12px;color:#64748b;line-height:1.5}.tag{color:#5b6ee1;font-size:13px;font-weight:800}.empty{text-align:center;color:#64748b;padding:44px}@media(max-width:860px){.page{padding:14px}.top{align-items:flex-start;flex-direction:column}.grid{grid-template-columns:1fr}.cat{position:static}.cards{grid-template-columns:1fr}.center h1{letter-spacing:-1.5px}}
</style></head><body><main class="page"><section class="hero"><nav class="top"><div class="brand"><div class="logo">清</div><div><strong>清漪导航</strong><span>Qingyi Nav</span></div></div><button class="admin">⚙ 后台配置</button></nav><div class="center"><p class="eyebrow">✦ 为主人聚合常用入口</p><h1>一处收藏万千路径，<br>把工具、文档与灵感安放妥帖。</h1><p class="sub">前台负责优雅展示，后续接入 Node.js + SQLite 后，所有分类与链接都能在后台自由配置。</p><label class="search">🔍<input id="search" placeholder="搜索网站、工具、文档、AI..."></label></div></section><section class="grid"><aside class="cat"><h3>分类</h3><div id="cats"></div></aside><section class="main"><div class="head"><div><p>当前展示</p><h2 id="headline">全部 · 0 个入口</h2></div><span>前端效果预览</span></div><div id="cards" class="cards"></div><div id="empty" class="empty" hidden>没有找到匹配的入口，换个关键词试试看。</div></section></section></main><script>
const cats=['全部','常用工具','开发文档','AI 助手','服务器','设计灵感'];let active='全部';const links=[['GitHub','代码托管与协作平台','常用工具','⌘','#24292f','https://github.com'],['Vercel','前端项目快速部署','常用工具','☁','#111827','https://vercel.com'],['Vue Docs','Vue 3 官方文档与生态','开发文档','◇','#42b883','https://vuejs.org'],['MDN Web Docs','Web 标准与浏览器 API','开发文档','◈','#2563eb','https://developer.mozilla.org'],['ChatGPT','灵感、代码与知识助手','AI 助手','✦','#10a37f','https://chat.openai.com'],['Claude','长文本分析与创作辅助','AI 助手','✧','#d97706','https://claude.ai'],['Portainer','Docker 可视化管理面板','服务器','▣','#13bef9','https://www.portainer.io'],['Cloudflare','DNS、CDN 与安全防护','服务器','☁','#f6821f','https://cloudflare.com'],['Dribbble','界面与视觉设计灵感','设计灵感','◐','#ea4c89','https://dribbble.com'],['Figma','协同设计与原型工具','设计灵感','✿','#a855f7','https://figma.com']];
const $=s=>document.querySelector(s);function render(){let word=$('#search').value.trim().toLowerCase();let data=links.filter(x=>(active==='全部'||x[2]===active)&&(!word||x.join(' ').toLowerCase().includes(word)));$('#headline').textContent=`${active} · ${data.length} 个入口`;$('#cards').innerHTML=data.map(x=>`<article class="card" onclick="window.open('${x[5]}','_blank')"><div class="ico" style="--c:${x[4]}">${x[3]}</div><div><div class="title"><h3>${x[0]}</h3><span>↗</span></div><p>${x[1]}</p><span class="tag">${x[2]}</span></div></article>`).join('');$('#empty').hidden=data.length>0;renderCats()}function renderCats(){$('#cats').innerHTML=cats.map(c=>`<button class="${c===active?'active':''}" onclick="active='${c}';render()"><span>${c}</span><small>${c==='全部'?links.length:links.filter(x=>x[2]===c).length}</small></button>`).join('')}$('#search').oninput=render;render();
</script></body></html>
